<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ক্লাউড অ্যাপ · ১ লক্ষ ওয়েবসাইট</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        body {
            background: #0b1424;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 4px;
        }

        /* 240x360 ফ্রেম – 2.4" ডিসপ্লে */
        .phone-frame {
            width: 240px;
            max-width: 240px;
            background: #eef3fc;
            border-radius: 24px;
            box-shadow: 0 20px 32px #00000060;
            overflow-y: auto;
            overflow-x: hidden;
            height: 360px;
            display: flex;
            flex-direction: column;
            border: 2px solid #1e3349;
            scrollbar-width: thin;
            scrollbar-color: #0080ff #bdd3f0;
        }

        .phone-frame::-webkit-scrollbar {
            width: 3px;
        }
        .phone-frame::-webkit-scrollbar-track {
            background: #bdd3f0;
        }
        .phone-frame::-webkit-scrollbar-thumb {
            background: #0080ff;
            border-radius: 6px;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px 6px 8px 6px;
        }

        /* শীর্ষে লোগো (Cloud-App) */
        .logo-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
        }

        .app-logo {
            background: linear-gradient(145deg, #122b44, #004080);
            width: 100%;
            border-radius: 60px;
            padding: 6px 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 3px solid #7bb3ff;
            box-shadow: 0 4px 0 #002856;
        }

        .app-logo span {
            font-size: 26px;
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 0 #001e3c;
        }

        .app-logo span::before {
            content: "☁️";
            font-size: 30px;
            margin-right: 5px;
            filter: drop-shadow(0 2px 2px black);
        }

        /* সার্চ বক্স */
        .search-area {
            width: 100%;
            margin-bottom: 10px;
        }

        #searchBox {
            width: 100%;
            padding: 10px 16px;
            background: #ffffff;
            border: 2px solid #b1cefc;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
            outline: none;
            color: #002858;
            box-shadow: inset 0 2px 5px #dde9ff;
        }

        #searchBox:focus {
            border-color: #0062d6;
            background: #f5fbff;
            box-shadow: 0 0 0 3px #0062d640;
        }

        /* ক্যাটাগরি স্ট্রিপ (স্ক্রলযোগ্য) */
        .cat-scroll {
            display: flex;
            flex-wrap: nowrap;
            gap: 5px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 6px;
            scrollbar-width: thin;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .cat-scroll::-webkit-scrollbar {
            height: 3px;
        }

        .cat-tab {
            background: #dbeafe;
            border: none;
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 700;
            color: #10355e;
            flex: 0 0 auto;
            border: 1px solid #99c1ff;
            box-shadow: 0 2px 3px #acc6ec;
            transition: 0.1s;
            text-transform: capitalize;
        }

        .cat-tab.active {
            background: #004e9e;
            color: white;
            border-color: #002f66;
            box-shadow: 0 3px 6px #004e9e;
        }

        .cat-tab:active {
            transform: scale(0.95);
        }

        /* ট্যাব: সকল ওয়েবসাইট / আমার বুকমার্ক */
        .view-toggle {
            display: flex;
            gap: 8px;
            margin: 4px 0 8px 0;
            justify-content: space-around;
        }

        .toggle-btn {
            flex: 1;
            background: #f1f9ff;
            border: 1.5px solid #8fb9f0;
            border-radius: 40px;
            padding: 6px 0;
            font-weight: 700;
            font-size: 12px;
            color: #0c3e6b;
            box-shadow: 0 2px 3px #bed3f0;
            transition: 0.1s;
        }

        .toggle-btn.active-view {
            background: #0055b3;
            color: white;
            border-color: #002a59;
            box-shadow: 0 3px 0 #001a38;
        }

        /* ওয়েবসাইট তালিকা */
        .websites-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 10px;
            flex: 1;
        }

        .site-card {
            background: #ffffff;
            border-radius: 40px;
            border: 1px solid #bad2f5;
            font-size: 12.5px;
            font-weight: 600;
            color: #012654;
            padding: 7px 12px 7px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 4px #b7cae0;
            transition: 0.1s;
            line-height: 1.3;
            word-break: break-word;
            position: relative;
        }

        .site-name {
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .site-name::before {
            content: "🌐";
            position: absolute;
            left: 10px;
            font-size: 14px;
        }

        .bookmark-star {
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            color: #ffb83b;
            transition: 0.1s;
            background: none;
            border: none;
            padding: 0 4px;
            text-shadow: 0 1px 3px #9aaec9;
            flex-shrink: 0;
        }

        .bookmark-star.active-star {
            color: #f5b10d;
            text-shadow: 0 0 5px orange;
            transform: scale(1.1);
        }

        /* সংরক্ষিত বুকমার্ক অংশ */
        .bookmark-section {
            background: #f7f0e5;
            border-radius: 30px;
            padding: 8px 8px 4px 8px;
            margin-bottom: 8px;
            border: 1px solid #ffdb9f;
        }

        .bookmark-header {
            font-weight: 800;
            font-size: 12px;
            color: #442d00;
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            padding: 0 4px;
        }

        .clear-bookmark {
            background: #f8d6a8;
            border: none;
            border-radius: 30px;
            padding: 2px 12px;
            font-size: 10px;
            font-weight: 800;
            color: #522e00;
            border: 1px solid #d68d3f;
        }

        .bookmark-items {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 70px;
            overflow-y: auto;
            font-size: 11px;
            padding-left: 6px;
            color: #242424;
        }

        .bookmark-item {
            background: #faeedb;
            border-radius: 30px;
            padding: 4px 10px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #e4bc83;
        }

        .remove-bookmark {
            color: red;
            font-weight: bold;
            font-size: 16px;
            background: none;
            border: none;
            padding: 0 5px;
            cursor: pointer;
        }

        .footer {
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            background: #dae8ff;
            padding: 7px 5px;
            border-radius: 60px;
            color: #012345;
            border: 1px solid #7fb0fc;
            margin-top: 5px;
        }

        .footer span {
            background: #00337c;
            color: white;
            padding: 2px 12px;
            border-radius: 40px;
            margin-left: 5px;
            font-size: 10px;
        }

        .empty-msg {
            color: #757575;
            text-align: center;
            padding: 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="content">
            <!-- লোগো শীর্ষে (Cloud-App) -->
            <div class="logo-section">
                <div class="app-logo">
                    <span>Cloud-App</span>
                </div>
            </div>

            <!-- সার্চ বক্স -->
            <div class="search-area">
                <input type="text" id="searchBox" placeholder="🔍 ১ লক্ষ সাইটে সার্চ...">
            </div>

            <!-- ক্যাটাগরি (স্ক্রল) -->
            <div class="cat-scroll" id="categoryContainer"></div>

            <!-- ভিউ সুইচ (সকল ওয়েবসাইট / বুকমার্ক) + জমা অপশন (বুকমার্ক) -->
            <div class="view-toggle">
                <button class="toggle-btn active-view" id="showAllBtn">🌐 সব সাইট</button>
                <button class="toggle-btn" id="showBookmarkBtn">⭐ বুকমার্ক</button>
            </div>

            <!-- বুকমার্ক এলাকা (শুধু বুকমার্ক ভিউতে দেখাবে, কিন্তু আমরা ডায়নামিক দেখাই) -->
            <div id="bookmarkPanel" style="display: none;" class="bookmark-section">
                <div class="bookmark-header">
                    <span>📌 আমার বুকমার্ক</span>
                    <button class="clear-bookmark" id="clearAllBookmarks">সব মুছুন</button>
                </div>
                <div id="bookmarkList" class="bookmark-items"></div>
            </div>

            <!-- ওয়েবসাইট তালিকা (সব সাইট / বুকমার্কের তালিকা এখানেই দেখাব) -->
            <ul class="websites-list" id="sitesList"></ul>

            <!-- ফুটার Developed & Owned By (Cloud-App) – লোগো আগে থাকলেও নিচে লেখা থাকবে -->
            <div class="footer">
                ⚡ Developed & Owned By <span>Cloud-App</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- ১০০,০০০ (এক লক্ষ) জনপ্রিয় ওয়েবসাইট জেনারেটর ----------
            const categories = [
                "সকল", "সোশ্যাল", "ভিডিও", "ই-কমার্স", "টেক", 
                "ব্লগ", "শিক্ষা", "গেমিং", "নিউজ", "অর্থ", 
                "স্বাস্থ্য", "ট্রাভেল", "মিউজিক", "ফোরাম", "গভঃ", "অন্যান্য"
            ];

            // বেস নাম পুল (৩০০+)
            const namePool = [
                "Google", "YouTube", "Facebook", "Amazon", "Wikipedia", "Reddit", "Twitter", "Instagram", "LinkedIn", "WhatsApp",
                "Netflix", "Spotify", "Telegram", "TikTok", "Snapchat", "Pinterest", "Twitch", "eBay", "AliExpress", "Shopify",
                "Medium", "Quora", "StackOverflow", "GitHub", "Microsoft", "Apple", "Yahoo", "Bing", "DuckDuckGo", "Adobe",
                "Zoom", "Slack", "Dropbox", "Office365", "WordPress", "Blogger", "Tumblr", "Imgur", "Flickr", "Discord",
                "Coursera", "Udemy", "KhanAcademy", "Britannica", "NationalGeo", "BBC", "CNN", "AlJazeera", "Reuters", "ProthomAlo",
                "DailyIttefaq", "KalerKantho", "Jugantor", "Samakal", "BonikBarta", "Daraz", "Pickaboo", "Rokomari", "Chaldal", "Foodpanda",
                "Pathao", "Uber", "Bikroy", "Evaly", "AjkerDeal", "Othoba", "Sheba", "Shohoz", "Bdjobs", "Freelancer",
                "Fiverr", "Upwork", "TechCrunch", "TheVerge", "Wired", "CNET", "Engadget", "Lifehacker", "Forbes", "Bloomberg",
                "WSJ", "FT", "EconomicTimes", "BusinessInsider", "Inc", "CoinDesk", "Binance", "Coinbase", "Kraken", "BDApps",
                "BanglaTech", "ICTBd", "ComputerJagat", "TechShohor", "Somewhereinblog", "AmarBlog", "BDLive", "RTV", "Channeli", "ATNBangla",
                "NTV", "Ekattor", "Jamuna", "DBCNews", "News24", "Independent", "DailyStar", "DhakaTribune", "NewAge", "FinancialExpress",
                "ObserverBD", "Banglanews24", "Bdnews24", "Risingbd", "Jagonews", "CricketBD", "Tigercricket", "ESPNcricinfo", "Cricbuzz", "SkySports",
                "NFL", "NBA", "FIFA", "UEFA", "Steam", "EpicGames", "Origin", "Blizzard", "Rockstar", "Naver",
                "Yandex", "Baidu", "Sogou", "Globo", "UOL", "Spiegel", "LeMonde", "Guardian", "ElPais", "Asahi",
                "ChinaDaily", "IndiaToday", "TimesOfIndia", "ZeeNews", "AajTak", "ABPNews", "News18", "Republic", "Opindia", "ThePrint",
                "YourStory", "Inc42", "TechInAsia", "e27", "Nikkei", "SCMP", "HackerNews", "ProductHunt", "IndieHackers", "HubSpot",
                "Salesforce", "SAP", "Oracle", "IBM", "Cisco", "Dell", "HP", "Lenovo", "Asus", "Acer",
                "MSI", "Gigabyte", "Razer", "Sony", "Panasonic", "Samsung", "LG", "Xiaomi", "Huawei", "OnePlus",
                "Oppo", "Vivo", "Realme", "Nokia", "Motorola", "Infinix", "Tecno", "Poco", "Nothing", "Qualcomm",
                "MediaTek", "Nvidia", "AMD", "Intel", "TSMC", "Spotify", "SoundCloud", "Bandcamp", "Tidal", "Shazam",
                "IMDb", "RottenTomatoes", "Metacritic", "MyAnimeList", "Crunchyroll", "Hulu", "Disney+", "HBO Max", "Peacock", "Paramount+",
                "FuboTV", "Sling", "PlutoTV", "Tubi", "Crackle", "Vudu", "Kanopy", "Goodreads", "StoryGraph", "LibraryThing",
                "Photobucket", "DeviantArt", "Behance", "Dribbble", "Figma", "Invision", "Medium", "Substack", "Ghost", "Hashnode",
                "Dev.to", "CodePen", "JSFiddle", "Replit", "CodeSandbox", "Glitch", "Netlify", "Vercel", "Heroku", "DigitalOcean",
                "Linode", "Vultr", "AWS", "Azure", "GCP", "Cloudflare", "Namecheap", "GoDaddy", "Hostinger", "Bluehost"
            ];

            // ১০০,০০০ সাইট তৈরি (ভ্যারিয়েশন + ক্যাটাগরি)
            function generateLakhSites() {
                const sites = [];
                const total = 100000;  // এক লক্ষ
                for (let i = 0; i < total; i++) {
                    let baseIndex = i % namePool.length;
                    let variant = Math.floor(i / namePool.length);
                    let baseName = namePool[baseIndex];
                    let displayName = variant === 0 ? baseName : baseName + " " + (variant + 1);
                    
                    // ক্যাটাগরি অ্যাসাইন (প্রিডিক্টেবল কিন্তু র‌্যান্ডম feel)
                    let catIndex = (i * 17) % (categories.length - 1);
                    let category = categories[catIndex + 1]; // exclude "সকল"

                    // কিছু নামের ক্যাটাগরি ওভাররাইড
                    if (baseName.match(/Google|Bing|Yahoo|DuckDuckGo|Baidu|Yandex/i)) category = "টেক";
                    if (baseName.match(/Facebook|Twitter|Instagram|LinkedIn|Snapchat|Telegram|WhatsApp|TikTok|Reddit/i)) category = "সোশ্যাল";
                    if (baseName.match(/YouTube|Netflix|Spotify|Hulu|Disney\+|Twitch|Tidal|SoundCloud|IMDb/i)) category = "ভিডিও";
                    if (baseName.match(/Amazon|eBay|AliExpress|Daraz|Pickaboo|Chaldal|Rokomari|Shopify|Evaly|AjkerDeal/i)) category = "ই-কমার্স";
                    if (baseName.match(/Coursera|KhanAcademy|Wikipedia|Britannica|Udemy|Duolingo/i)) category = "শিক্ষা";
                    if (baseName.match(/BBC|CNN|AlJazeera|ProthomAlo|BDnews|Reuters|NDTV|DailyStar|Ekattor/i)) category = "নিউজ";
                    if (baseName.match(/Steam|EpicGames|Blizzard|Rockstar|NFL|NBA|FIFA|CricketBD|Cricbuzz/i)) category = "গেমিং";
                    
                    sites.push({ name: displayName, category: category, id: i });
                }
                return sites;
            }

            const allSites = generateLakhSites(); // length = 100,000
            let currentView = 'all'; // 'all' অথবা 'bookmark'
            let activeCategory = 'সকল';
            let searchText = '';

            // বুকমার্ক স্টোর ( লোকাল স্টোরেজের মতো, কিন্তু এখানে মেমরিতে )
            let bookmarks = []; // প্রতিটি বুকমার্কে { id, name, category }

            // ডিওএম এলিমেন্ট
            const searchBox = document.getElementById('searchBox');
            const sitesListEl = document.getElementById('sitesList');
            const categoryContainer = document.getElementById('categoryContainer');
            const showAllBtn = document.getElementById('showAllBtn');
            const showBookmarkBtn = document.getElementById('showBookmarkBtn');
            const bookmarkPanel = document.getElementById('bookmarkPanel');
            const bookmarkListEl = document.getElementById('bookmarkList');
            const clearAllBtn = document.getElementById('clearAllBookmarks');

            // ক্যাটাগরি বাটন রেন্ডার
            function renderCategoryTabs() {
                categoryContainer.innerHTML = '';
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = `cat-tab ${activeCategory === cat ? 'active' : ''}`;
                    btn.innerText = cat;
                    btn.dataset.cat = cat;
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        activeCategory = cat;
                        filterAndRenderSites();
                    });
                    categoryContainer.appendChild(btn);
                });
            }

            // বুকমার্ক যুক্ত/অপসারণ
            function toggleBookmark(siteId, siteName, siteCategory) {
                const existingIndex = bookmarks.findIndex(b => b.id === siteId);
                if (existingIndex >= 0) {
                    bookmarks.splice(existingIndex, 1); // remove
                } else {
                    bookmarks.push({ id: siteId, name: siteName, category: siteCategory });
                }
                // পুনরায় রেন্ডার (বর্তমান ভিউ অনুযায়ী)
                if (currentView === 'bookmark') {
                    showBookmarkView();
                } else {
                    filterAndRenderSites(); // all view এ স্টার আপডেট হবে
                }
                renderBookmarkPanel(); // বুকমার্ক প্যানেল আপডেট
            }

            // বুকমার্ক প্যানেল (নিচের অংশ) আপডেট
            function renderBookmarkPanel() {
                if (bookmarks.length === 0) {
                    bookmarkListEl.innerHTML = '<div class="empty-msg">কোনো বুকমার্ক নেই ⭐</div>';
                } else {
                    bookmarkListEl.innerHTML = bookmarks.map(bm => {
                        return `<div class="bookmark-item">
                            <span>🔖 ${bm.name}</span>
                            <button class="remove-bookmark" data-id="${bm.id}">🗑️</button>
                        </div>`;
                    }).join('');

                    // প্রতিটি remove বাটনে ইভেন্ট
                    document.querySelectorAll('.remove-bookmark').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const id = Number(e.target.dataset.id);
                            const index = bookmarks.findIndex(b => b.id === id);
                            if (index !== -1) bookmarks.splice(index, 1);
                            
                            if (currentView === 'bookmark') showBookmarkView();
                            else filterAndRenderSites();
                            
                            renderBookmarkPanel(); 
                        });
                    });
                }
            }

            // বুকমার্ক ভিউ (শুধু বুকমার্ক করা সাইট দেখায়)
            function showBookmarkView() {
                currentView = 'bookmark';
                showAllBtn.classList.remove('active-view');
                showBookmarkBtn.classList.add('active-view');
                bookmarkPanel.style.display = 'block';

                if (bookmarks.length === 0) {
                    sitesListEl.innerHTML = '<li class="empty-msg">⭐ কোনো বুকমার্ক নাই</li>';
                    return;
                }
                // বুকমার্ক আইডি থেকে পুরো সাইট বের করে দেখানো
                const bookmarkedSites = allSites.filter(s => bookmarks.some(b => b.id === s.id));
                // ক্যাটাগরি ও সার্চ ফিল্টার এখানে ইগনোর করা যেতে পারে (চাইলে অ্যাড করা যাবে)
                // তবে ইচ্ছে করলে ক্যাটাগরি অ্যাপ্লাই করা যেতে পারে। আমরা বুকমার্কে সব দেখাব, ক্যাটাগরি ফিল্টার নাই। 
                // (বা চাইলে activeCategory বসাতে পারি, তবে ভালোUX এর জন্য আমরা বুকমার্কে ক্যাটাগরি উপেক্ষা করি)
                let filtered = bookmarkedSites;
                if (searchText.trim() !== '') {
                    filtered = filtered.filter(s => s.name.toLowerCase().includes(searchText.toLowerCase()));
                }

                sitesListEl.innerHTML = filtered.map(site => {
                    const isMarked = bookmarks.some(b => b.id === site.id);
                    return `<li class="site-card">
                        <span class="site-name">${site.name}</span>
                        <button class="bookmark-star ${isMarked ? 'active-star' : ''}" data-id="${site.id}" data-name="${site.name}" data-cat="${site.category}">${isMarked ? '⭐' : '☆'}</button>
                    </li>`;
                }).join('');

                attachStarEvents();
                renderBookmarkPanel();
            }

            // সব সাইট দেখানো (ফিল্টার + সার্চ + ক্যাটাগরি)
            function filterAndRenderSites() {
                if (currentView === 'bookmark') {
                    showBookmarkView();
                    return;
                }
                currentView = 'all';
                showAllBtn.classList.add('active-view');
                showBookmarkBtn.classList.remove('active-view');
                bookmarkPanel.style.display = 'none';

                const term = searchText.toLowerCase();
                const filtered = allSites.filter(site => {
                    const matchSearch = site.name.toLowerCase().includes(term);
                    const matchCat = activeCategory === 'সকল' || site.category === activeCategory;
                    return matchSearch && matchCat;
                });

                if (filtered.length === 0) {
                    sitesListEl.innerHTML = '<li class="empty-msg">❌ কোনো সাইট পাওয়া যায়নি</li>';
                    return;
                }

                sitesListEl.innerHTML = filtered.map(site => {
                    const isBookmarked = bookmarks.some(b => b.id === site.id);
                    return `<li class="site-card">
                        <span class="site-name">${site.name}</span>
                        <button class="bookmark-star ${isBookmarked ? 'active-star' : ''}" data-id="${site.id}" data-name="${site.name}" data-cat="${site.category}">${isBookmarked ? '⭐' : '☆'}</button>
                    </li>`;
                }).join('');

                attachStarEvents();
            }

            // স্টার বাটনে ক্লিক ইভেন্ট
            function attachStarEvents() {
                document.querySelectorAll('.bookmark-star').forEach(star => {
                    star.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = Number(star.dataset.id);
                        const name = star.dataset.name;
                        const cat = star.dataset.cat;
                        toggleBookmark(id, name, cat);
                    });
                });
            }

            // ইনপুট ও ক্যাটাগরি ইভেন্ট
            searchBox.addEventListener('input', (e) => {
                searchText = e.target.value;
                if (currentView === 'all') filterAndRenderSites();
                else showBookmarkView();  // বুকমার্কের ভিতরে সার্চ
            });

            // টগল বাটন
            showAllBtn.addEventListener('click', () => {
                if (currentView !== 'all') {
                    currentView = 'all';
                    filterAndRenderSites();
                }
            });

            showBookmarkBtn.addEventListener('click', () => {
                if (currentView !== 'bookmark') {
                    showBookmarkView();
                }
            });

            // ক্লিয়ার বুকমার্ক
            clearAllBtn.addEventListener('click', () => {
                bookmarks = [];
                if (currentView === 'bookmark') showBookmarkView();
                else filterAndRenderSites();
                renderBookmarkPanel();
            });

            // শুরু
            renderCategoryTabs();
            filterAndRenderSites();
            renderBookmarkPanel();
        })();
    </script>
</body>
</html>
