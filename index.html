<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Phone BD - All Web App</title>
    <style>
        /* মূল ডিজাইন ও ডার্ক থিম */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #040d16; color: white; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; position: relative; min-height: 100vh; padding-bottom: 80px; }
        
        /* কালার চেঞ্জিং অ্যানিমেশন হেডার */
        .brand-header { text-align: center; padding: 20px 0 10px; }
        
        .brand-header h1 { 
            font-size: 32px; 
            font-weight: bold; 
            letter-spacing: 1px; 
            margin-bottom: 5px;
            animation: colorChange 4s infinite; 
        }

        @keyframes colorChange {
            0% { color: red; }
            25% { color: blue; }
            50% { color: yellow; }
            75% { color: green; }
            100% { color: red; }
        }

        .brand-header p { 
            color: #ffffff; 
            font-size: 16px; 
            font-weight: 500; 
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }
        
        /* ক্যাটাগরি টাইটেল */
        h2 { 
            font-size: 14px; color: #00ffcc; margin: 25px 0 12px; 
            border-left: 4px solid #32CD32; padding-left: 10px; 
        }
        
        /* গ্রিড লেআউট */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        
        /* কার্ড ডিজাইন */
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid #1b263b; 
            border-radius: 12px; 
            padding: 12px 5px; 
            text-align: center; 
            text-decoration: none; 
            color: #ccc; 
            transition: 0.3s;
            display: flex; flex-direction: column; align-items: center;
        }
        .card:hover { 
            background: rgba(0, 255, 204, 0.1); 
            border-color: #00ffcc; 
            transform: translateY(-3px); 
            color: #fff; 
        }

        /* আইকন বক্স */
        .icon-box { 
            width: 55px; height: 55px; background: white; border-radius: 12px; 
            margin-bottom: 8px; display: flex; align-items: center; justify-content: center;
            border: 2px solid #32CD32; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .icon-box img { width: 75%; height: 75%; object-fit: contain; }
        .card span { font-size: 11px; font-weight: 500; }

        /* Footer / Owner Info */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .footer p {
            color: #888;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .footer b {
            color: #00ffcc;
        }

        /* স্ক্রলবার হাইড */
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
