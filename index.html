<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cloud-App | ১,০৯২+ ওয়েবসাইট ডিরেক্টরি</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
:root{--bg:#0f0c29;--bg2:#302b63;--bg3:#24243e;--accent:#7c3aed;--accent2:#a855f7;--card:#1e1b4b;--text:#e2e8f0;--muted:#94a3b8;--border:#312e81}
body{background:linear-gradient(135deg,var(--bg),var(--bg2),var(--bg3));min-height:100vh;color:var(--text)}

/* HEADER */
header{background:rgba(15,12,41,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:999;padding:0 16px}
.hrow{display:flex;align-items:center;justify-content:space-between;height:56px;max-width:1400px;margin:0 auto}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-size:18px;font-weight:700;color:#fff}
.logo-text span{color:var(--accent2)}
.logo-sub{font-size:11px;color:var(--muted);display:block;line-height:1}
.header-right{display:flex;align-items:center;gap:12px}
.stat-badge{background:rgba(124,58,237,0.2);border:1px solid var(--accent);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--accent2)}

/* MENU */
.menu-btn{background:none;border:1px solid var(--border);color:var(--text);cursor:pointer;padding:6px 14px;border-radius:8px;font-size:13px;display:flex;align-items:center;gap:6px;transition:all 0.2s}
.menu-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.menu-dropdown{position:absolute;top:56px;right:16px;background:rgba(15,12,41,0.98);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:12px;min-width:180px;overflow:hidden;display:none;z-index:1000;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.menu-dropdown.open{display:block;animation:fadeIn 0.15s ease}
.menu-item{padding:12px 18px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text);transition:background 0.15s}
.menu-item:hover{background:rgba(124,58,237,0.2)}
.menu-item i{color:var(--accent2);width:16px}
.menu-divider{height:1px;background:var(--border)}

/* ABOUT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:2000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:linear-gradient(135deg,rgba(30,27,75,0.98),rgba(49,46,129,0.98));border:1px solid var(--border);border-radius:20px;padding:40px;max-width:420px;width:90%;text-align:center;animation:scaleIn 0.2s ease}
.modal-logo{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
.modal h2{font-size:22px;font-weight:700;color:#fff;margin-bottom:8px}
.modal p{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:12px}
.modal .copyright{background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);border-radius:10px;padding:14px;font-size:13px;color:var(--accent2);margin-top:16px}
.modal-close{margin-top:20px;background:var(--accent);color:#fff;border:none;padding:10px 28px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600}
.modal-close:hover{background:var(--accent2)}

/* SEARCH BAR */
.search-wrap{max-width:1400px;margin:0 auto;padding:20px 16px 0}
.search-box{position:relative;max-width:600px;margin:0 auto}
.search-box input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;padding:12px 16px 12px 44px;font-size:15px;color:var(--text);outline:none;transition:border-color 0.2s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--muted)}
.search-box i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}

/* CATEGORIES */
.cats-wrap{max-width:1400px;margin:0 auto;padding:16px 16px 0}
.cats-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);cursor:pointer;padding:6px 14px;border-radius:20px;font-size:12px;white-space:nowrap;transition:all 0.15s;display:flex;align-items:center;gap:6px}
.cat-btn:hover{border-color:var(--accent);color:var(--text)}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cat-btn .cnt{background:rgba(255,255,255,0.2);border-radius:10px;padding:1px 6px;font-size:10px}

/* STATS BAR */
.stats-bar{max-width:1400px;margin:12px auto 0;padding:0 16px;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted)}
.stats-bar span{color:var(--accent2)}

/* GRID */
.grid-wrap{max-width:1400px;margin:16px auto;padding:0 16px 40px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}

/* CARD */
.card{background:rgba(30,27,75,0.6);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:transform 0.15s,border-color 0.15s,background 0.15s;text-decoration:none;display:block}
.card:hover{transform:translateY(-3px);border-color:var(--accent);background:rgba(124,58,237,0.1)}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.card-icon{width:42px;height:42px;background:linear-gradient(135deg,rgba(124,58,237,0.3),rgba(168,85,247,0.3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent2);flex-shrink:0}
.card-title{font-size:15px;font-weight:600;color:#fff;line-height:1.2}
.card-cat{font-size:11px;color:var(--accent2);margin-top:2px}
.card-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.card-rating{display:flex;align-items:center;gap:4px;font-size:12px;color:#fbbf24}
.card-rating span{color:var(--muted)}
.card-visits{font-size:11px;color:var(--muted)}

/* PAGINATION */
.pagination{display:flex;gap:6px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.page-btn{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:13px;transition:all 0.15s;min-width:36px}
.page-btn:hover,.page-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.page-btn:disabled{opacity:0.3;cursor:not-allowed}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty i{font-size:48px;margin-bottom:16px;display:block;color:var(--border)}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.card-enter{animation:fadeIn 0.15s ease}

/* RESPONSIVE */
@media(max-width:600px){
  #grid{grid-template-columns:1fr 1fr}
  .card{padding:12px}
  .card-icon{width:36px;height:36px;font-size:15px}
  .card-title{font-size:13px}
  .stat-badge{display:none}
  .logo-sub{display:none}
}
@media(max-width:380px){
  #grid{grid-template-columns:1fr}
}
</style>
</head>

const PER_PAGE = 48;
let activeCat = 'All';
let searchQ = '';
let page = 1;
let filtered = W;

// Category icons
const ICONS = {
  'All':'fas fa-globe','Social Media':'fab fa-facebook','Search Engine':'fas fa-search',

  'Jobs':'fas fa-briefcase','Cloud':'fas fa-cloud','Shopping':'fas fa-bag-shopping',
  'Music':'fas fa-music','Photography':'fas fa-camera','Security':'fas fa-shield-alt',
  'Real Estate':'fas fa-home','Sports':'fas fa-trophy','Bangladesh':'fas fa-flag',

  'Agriculture':'fas fa-tractor','Logistics':'fas fa-shipping-fast','Media Production':'fas fa-film',
  'Events':'fas fa-ticket-alt','HR & Business':'fas fa-briefcase','Marketing':'fas fa-bullhorn',
  'Diet':'fas fa-apple-alt','Mental Health':'fas fa-brain','Writing':'fas fa-pen',
  'Language':'fas fa-language','Startups':'fas fa-rocket','Pets':'fas fa-paw','Home':'fas fa-home'
};

function buildCats() {
  const row = document.getElementById('catsRow');
  const html = CATS.map(c => {
    const cnt = c === 'All' ? W.length : (CAT_STATS[c] || 0);
    const icon = ICONS[c] || 'fas fa-tag';
    return `<button class="cat-btn${c===activeCat?' active':''}" onclick="selectCat('${c}')" title="${c}"><i class="${icon}"></i>${c}<span class="cnt">${cnt}</span></button>`;
  }).join('');
  row.innerHTML = html;
}

function filter() {
  const q = searchQ.toLowerCase();
  filtered = W.filter(w => {
    const catOk = activeCat === 'All' || w.c === activeCat;
    const qOk = !q || w.n.toLowerCase().includes(q) || w.d.toLowerCase().includes(q) || w.c.toLowerCase().includes(q);
    return catOk && qOk;
  });
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const start = (page-1)*PER_PAGE;
  const chunk = filtered.slice(start, start+PER_PAGE);
  
  if (!chunk.length) {
    grid.innerHTML = '<div class="empty"><i class="fas fa-search"></i><p>কোনো ওয়েবসাইট পাওয়া যায়নি</p></div>';
    document.getElementById('statsBar').textContent = '';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  // Build HTML string all at once - fastest approach
  const parts = chunk.map(w => {
    const stars = '★'.repeat(Math.floor(w.r)) + (w.r%1>=0.5?'½':'');
    return `<a class="card card-enter" href="${w.u}" target="_blank" rel="noopener">
      <div class="card-header">
        <div class="card-icon"><i class="${w.l}"></i></div>
        <div><div class="card-title">${w.n}</div><div class="card-cat">${w.c}</div></div>
      </div>
      <div class="card-desc">${w.d}</div>
      <div class="card-footer">
        <div class="card-rating"><i class="fas fa-star" style="font-size:10px"></i> ${w.r}<span>/5</span></div>
        <div class="card-visits"><i class="fas fa-users" style="font-size:9px"></i> ${w.v}</div>
      </div>
    </a>`;
  });
  grid.innerHTML = parts.join('');

  // Stats
  document.getElementById('statsBar').innerHTML = `দেখানো হচ্ছে: <span>${start+1}-${Math.min(start+PER_PAGE,filtered.length)}</span> / মোট <span>${filtered.length}</span> ওয়েবসাইট`;
  
  renderPagination();
}

function renderPagination() {
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML=''; return; }
  
  const pag = document.getElementById('pagination');
  const parts = [];
  if (page > 1) parts.push(`<button class="page-btn" onclick="goPage(${page-1})"><i class="fas fa-chevron-left"></i></button>`);
  
  let start = Math.max(1, page-2), end = Math.min(totalPages, page+2);
  if (start > 1) parts.push(`<button class="page-btn" onclick="goPage(1)">1</button>${start>2?'<span style="color:var(--muted);padding:0 4px">…</span>':''}`);
  for (let i=start;i<=end;i++) parts.push(`<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`);
  if (end < totalPages) parts.push(`${end<totalPages-1?'<span style="color:var(--muted);padding:0 4px">…</span>':''}<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`);
  if (page < totalPages) parts.push(`<button class="page-btn" onclick="goPage(${page+1})"><i class="fas fa-chevron-right"></i></button>`);
  
  pag.innerHTML = parts.join('');
}

function goPage(p) {
  page = p;
  renderGrid();
  window.scrollTo({top:0,behavior:'smooth'});
}

function selectCat(c) {
  activeCat = c;
  page = 1;
  filter();
  buildCats();
  renderGrid();
}

let searchTimer;
function onSearch(v) {
  searchQ = v;
  page = 1;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { filter(); renderGrid(); }, 150);
}

  const d = document.getElementById('menuDrop');
  d.classList.toggle('open');

function openAbout() {
  document.getElementById('menuDrop').classList.remove('open');
  document.getElementById('aboutModal').classList.add('open');
}

function closeAbout(e) {
  if (!e || e.target === document.getElementById('aboutModal')) {
    document.getElementById('aboutModal').classList.remove('open');
  }
}

function scrollToTop() {
  document.getElementById('menuDrop').classList.remove('open');
  window.scrollTo({top:0,behavior:'smooth'});
}

// Close menu on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.menu-btn') && !e.target.closest('.menu-dropdown')) {
    document.getElementById('menuDrop').classList.remove('open');
  }
});

// INIT — immediate render, no delay
filter();
buildCats();
renderGrid();
</script>
</body>
